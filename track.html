<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Track Order – GroutGrove</title>
  <link rel="stylesheet" href="../style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    .track-hero{background:linear-gradient(135deg,#0F172A,#1E293B);padding:56px 24px;text-align:center}
    .track-hero h1{font-family:'Playfair Display',serif;font-size:38px;font-weight:800;color:white;margin-bottom:8px}
    .track-hero h1 span{color:#F59E0B}
    .track-hero p{color:rgba(255,255,255,.45);font-size:15px}
    .track-page{max-width:700px;margin:36px auto 80px;padding:0 24px}
    .search-card{background:white;border-radius:20px;padding:28px;border:1.5px solid #E2E8F0;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:24px}
    .search-card h3{font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;color:#1E293B}
    .search-row{display:flex;gap:10px}
    .search-row input{flex:1;border:1.5px solid #E2E8F0;border-radius:12px;padding:13px 15px;font-family:'DM Sans';font-size:15px;outline:none;background:#FAFCFB;color:#1E293B;transition:border .2s}
    .search-row input:focus{border-color:#1E293B;background:white}
    .btn-track{background:#1E293B;color:white;border:none;border-radius:12px;padding:13px 22px;font-family:'DM Sans';font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap}
    .btn-track:hover{background:#0F172A}
    .err-msg{background:#FEF2F2;border:1.5px solid #EF4444;border-radius:12px;padding:13px;font-size:14px;color:#DC2626;margin-top:14px;display:none}
    .result-card{background:white;border-radius:20px;padding:28px;border:1.5px solid #E2E8F0;box-shadow:0 2px 12px rgba(0,0,0,.06)}
    .order-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid #F1F5F9}
    .order-id{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:#1E293B}
    .order-date{font-size:13px;color:#64748B;margin-top:4px}
    .status-pill{padding:8px 18px;border-radius:50px;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
    .s-pending{background:#FEF3C7;color:#92400E}
    .s-confirmed{background:#DBEAFE;color:#1E40AF}
    .s-delivered{background:#D1FAE5;color:#065F46}
    .s-cancelled{background:#FEE2E2;color:#DC2626}

    /* TRACKING TIMELINE */
    .timeline{margin:22px 0}
    .tl-item{display:flex;gap:16px;margin-bottom:0}
    .tl-left{display:flex;flex-direction:column;align-items:center;width:36px;flex-shrink:0}
    .tl-dot{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:2px solid transparent}
    .tl-dot.done{background:#1E293B;border-color:#1E293B;color:white}
    .tl-dot.active{background:#F59E0B;border-color:#F59E0B;color:white}
    .tl-dot.pending{background:#F1F5F9;border-color:#E2E8F0;color:#94A3B8}
    .tl-line{width:2px;flex:1;min-height:32px;background:#E2E8F0;margin:4px 0}
    .tl-line.done{background:#1E293B}
    .tl-content{padding-bottom:28px;flex:1}
    .tl-title{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;color:#1E293B;margin-bottom:3px}
    .tl-title.pending-text{color:#94A3B8}
    .tl-desc{font-size:13px;color:#64748B;line-height:1.5}
    .tl-time{font-size:12px;color:#94A3B8;margin-top:4px}

    /* ORDER DETAILS */
    .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0}
    .detail-item{background:#F8FAFC;border-radius:12px;padding:14px}
    .detail-item label{display:block;font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
    .detail-item span{font-size:14px;font-weight:600;color:#1E293B}
    .items-list{background:#F0FDF4;border-radius:12px;padding:14px;margin:14px 0}
    .items-list h4{font-size:12px;font-weight:700;color:#166534;margin-bottom:8px;text-transform:uppercase}
    .items-list p{font-size:13px;color:#1E293B;margin-bottom:4px}
    .price-summary{background:#F8FAFC;border-radius:12px;padding:16px;margin:14px 0}
    .ps-row{display:flex;justify-content:space-between;font-size:14px;color:#475569;padding:5px 0}
    .ps-row.total{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#1E293B;padding-top:10px;border-top:1px solid #E2E8F0;margin-top:4px}
    .action-btns{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
    .btn-wa-track{background:#25D366;color:white;border:none;border-radius:50px;padding:12px 22px;font-family:'DM Sans';font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
    .btn-invoice{background:#1E293B;color:white;border:none;border-radius:50px;padding:12px 22px;font-family:'DM Sans';font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
    .my-orders-section{margin-top:28px}
    .my-orders-section h3{font-family:'DM Sans',sans-serif;font-size:16px;font-weight:700;margin-bottom:14px;color:#1E293B}
    .mo-card{background:white;border:1.5px solid #E2E8F0;border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
    .mo-card:hover{border-color:#F59E0B;box-shadow:0 2px 10px rgba(245,158,11,.1)}
    .mo-id{font-family:'Playfair Display',serif;font-size:16px;font-weight:800;color:#1E293B}
    .mo-items{font-size:12px;color:#64748B;margin-top:3px}
    .mo-total{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#1E293B}
  </style>
</head>
<body>
<div class="ticker-wrap"><div class="ticker">
  <span>Track your order anytime</span><span>Support: +91 96541 71005</span>
  <span>Same Day Delivery Delhi NCR</span><span>Track your order anytime</span>
</div></div>

<nav>
  <div class="nav-inner">
    <a href="../index.html" class="logo">Grout<span>Grove</span></a>
    <div class="nav-links" id="navLinks">
      <a href="../index.html">Home</a><a href="products.html">Products</a>
      <a href="track.html">Track Order</a><a href="contact.html">Contact</a>
      <a href="login.html" id="loginNavBtn">Login</a>
      <span id="userBadge" style="display:none;background:#1E293B;color:white;font-size:13px;font-weight:700;padding:6px 14px;border-radius:50px;cursor:pointer;" onclick="logoutUser()">👤 <span id="userName"></span> ✕</span>
      <a href="cart.html" class="nav-cta">🛒 Cart</a>
    </div>
    <button class="hamburger" onclick="toggleNav()">☰</button>
  </div>
</nav>

<div class="track-hero">
  <h1>Track Your <span>Order</span></h1>
  <p>Enter your Order ID to see real-time delivery status</p>
</div>

<div class="track-page">
  <div class="search-card">
    <h3>🔍 Enter Order ID</h3>
    <div class="search-row">
      <input type="text" id="trackInput" placeholder="e.g. GG-123456" style="text-transform:uppercase"
        onkeydown="if(event.key==='Enter')trackOrder()" oninput="this.value=this.value.toUpperCase()"/>
      <button class="btn-track" onclick="trackOrder()">Track →</button>
    </div>
    <div class="err-msg" id="errMsg"></div>
  </div>

  <div id="trackResult" style="display:none"></div>

  <!-- My Recent Orders -->
  <div class="my-orders-section" id="myOrdersSection" style="display:none">
    <h3>📦 Your Recent Orders</h3>
    <div id="myOrdersList"></div>
  </div>
</div>

<script src="../script.js"></script>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://ddgwdesqicrneikxrcnj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkZ3dkZXNxaWNybmVpa3hyY25qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3Mzc1MTksImV4cCI6MjA4OTMxMzUxOX0.AFH7Sfat5XnYFYocdbjZlYhL5iLG1dO6wXm_FHycAqo'
);

const nxUser = JSON.parse(localStorage.getItem('nx_user'));
window.addEventListener('load', function() {
  if(nxUser) {
    const lb=document.getElementById('loginNavBtn');const ub=document.getElementById('userBadge');const un=document.getElementById('userName');
    if(lb)lb.style.display='none';if(ub)ub.style.display='inline-flex';if(un)un.textContent=nxUser.name.split(' ')[0];
  }
  // Show my orders from localStorage
  const myOrders = JSON.parse(localStorage.getItem('my_orders')) || [];
  if(myOrders.length > 0) {
    document.getElementById('myOrdersSection').style.display = 'block';
    const list = document.getElementById('myOrdersList');
    list.innerHTML = myOrders.map(o => `
      <div class="mo-card" onclick="document.getElementById('trackInput').value='${o.order_id}';trackOrder()">
        <div>
          <div class="mo-id">${o.order_id}</div>
          <div class="mo-items">${o.items ? o.items.map(i=>i.name).join(', ').substring(0,60)+'...' : o.items}</div>
          <div style="font-size:11px;color:#94A3B8;margin-top:3px">${new Date(o.placed_at).toLocaleDateString('en-IN')}</div>
        </div>
        <div style="text-align:right">
          <div class="mo-total">₹${parseFloat(o.total).toLocaleString('en-IN')}</div>
          <div style="font-size:12px;color:#64748B;margin-top:3px">${o.status||'Pending'}</div>
        </div>
      </div>`).join('');
  }

  // Auto-track from URL
  const urlId = new URLSearchParams(window.location.search).get('id');
  if(urlId) {
    document.getElementById('trackInput').value = urlId;
    trackOrder();
  }
});
function logoutUser(){localStorage.removeItem('nx_user');window.location.reload();}

function getTimeline(status, placedAt) {
  const now = new Date();
  const placed = new Date(placedAt);
  const steps = [
    { key:'placed', label:'Order Placed', icon:'✅', desc:'Your order has been received successfully.', time: placed.toLocaleString('en-IN') },
    { key:'confirmed', label:'Order Confirmed', icon:'📋', desc:'GroutGrove team has confirmed your order.', time:'' },
    { key:'dispatched', label:'Material Dispatched', icon:'🚛', desc:'Material loaded and on the way to your site.', time:'' },
    { key:'out', label:'Out for Delivery', icon:'📍', desc:'Delivery vehicle is near your location.', time:'' },
    { key:'delivered', label:'Delivered', icon:'🎉', desc:'Material delivered successfully to your site!', time:'' }
  ];
  const statusMap = {
    pending: 0,
    confirmed: 1,
    dispatched: 2,
    out_for_delivery: 3,
    delivered: 4,
    cancelled: -1
  };
  const currentIdx = statusMap[status] ?? 0;
  return steps.map((s,i) => ({
    ...s,
    state: i < currentIdx ? 'done' : i === currentIdx ? 'active' : 'pending'
  }));
}

async function trackOrder() {
  const input = document.getElementById('trackInput').value.trim().toUpperCase();
  const errEl = document.getElementById('errMsg');
  const resEl = document.getElementById('trackResult');

  if(!input || !input.startsWith('GG-')) {
    errEl.textContent = '❌ Please enter valid Order ID starting with GG-';
    errEl.style.display = 'block'; resEl.style.display = 'none'; return;
  }
  errEl.style.display = 'none';
  resEl.style.display = 'block';
  resEl.innerHTML = '<div class="result-card" style="text-align:center;padding:40px">⏳ Tracking your order...</div>';

  // First check localStorage
  const myOrders = JSON.parse(localStorage.getItem('my_orders')) || [];
  let localOrder = myOrders.find(o => o.order_id === input);

  try {
    const { data, error } = await sb.from('orders').select('*').eq('order_id', input).single();
    if(error || !data) {
      if(localOrder) {
        renderTrackResult(localOrder, true);
      } else {
        errEl.textContent = '❌ Order not found! Check Order ID or contact: +91 96541 71005';
        errEl.style.display = 'block';
        resEl.style.display = 'none';
      }
      return;
    }
    renderTrackResult(data, false);
  } catch(err) {
    if(localOrder) {
      renderTrackResult(localOrder, true);
    } else {
      errEl.textContent = '❌ Connection error. Try again or call: +91 96541 71005';
      errEl.style.display = 'block';
      resEl.style.display = 'none';
    }
  }
}

function renderTrackResult(order, isLocal) {
  const el = document.getElementById('trackResult');
  const status = order.status || 'pending';
  const timeline = getTimeline(status, order.placed_at || order.created_at || new Date());
  const statusClass = {pending:'s-pending',confirmed:'s-confirmed',delivered:'s-delivered',cancelled:'s-cancelled'}[status] || 's-pending';
  const statusLabel = {pending:'⏳ Pending',confirmed:'✅ Confirmed',dispatched:'🚛 Dispatched',out_for_delivery:'📍 Out for Delivery',delivered:'🎉 Delivered',cancelled:'❌ Cancelled'}[status] || '⏳ Pending';

  // Items display
  let itemsHtml = '';
  if(isLocal && order.items && Array.isArray(order.items)) {
    itemsHtml = order.items.map(i => `<p>• ${i.name} ×${i.qty} = ₹${(i.price*i.qty).toLocaleString('en-IN')}</p>`).join('');
  } else {
    itemsHtml = `<p>${order.items || 'Order items'}</p>`;
  }

  const subtotal = order.subtotal || order.total;
  const delCharge = order.delivery_charge ?? (order.total > 5000 ? 0 : 149);
  const total = order.total || subtotal;

  el.style.display = 'block';
  el.innerHTML = `<div class="result-card">
    <div class="order-header">
      <div>
        <div class="order-id">${order.order_id}</div>
        <div class="order-date">📅 ${new Date(order.placed_at||order.created_at||Date.now()).toLocaleString('en-IN')}</div>
      </div>
      <span class="status-pill ${statusClass}">${statusLabel}</span>
    </div>

    <div class="timeline">
      ${timeline.map((step,i) => `
        <div class="tl-item">
          <div class="tl-left">
            <div class="tl-dot ${step.state}">${step.state==='done'?'✓':step.state==='active'?step.icon:'○'}</div>
            ${i < timeline.length-1 ? `<div class="tl-line ${step.state==='done'?'done':''}"></div>` : ''}
          </div>
          <div class="tl-content">
            <div class="tl-title ${step.state==='pending'?'pending-text':''}">${step.label}</div>
            <div class="tl-desc">${step.state!=='pending'?step.desc:'Waiting...'}</div>
            ${step.time&&step.state!=='pending'?`<div class="tl-time">${step.time}</div>`:''}
          </div>
        </div>`).join('')}
    </div>

    <div class="detail-grid">
      <div class="detail-item"><label>Customer</label><span>${order.customer_name||'—'}</span></div>
      <div class="detail-item"><label>Phone</label><span>${order.customer_phone||'—'}</span></div>
      <div class="detail-item"><label>Payment</label><span>${order.payment_method||order.payment||'—'}</span></div>
      <div class="detail-item"><label>Delivery Type</label><span>${order.delivery_type||order.delivery?.name||'Standard'}</span></div>
    </div>

    <div class="detail-item" style="background:#F8FAFC;border-radius:12px;padding:14px;margin-bottom:12px">
      <label style="font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;display:block">Delivery Address</label>
      <span style="font-size:14px;font-weight:600;color:#1E293B">${order.delivery_address||'—'}</span>
    </div>

    <div class="items-list">
      <h4>📦 Order Items</h4>
      ${itemsHtml}
    </div>

    <div class="price-summary">
      <div class="ps-row"><span>Subtotal</span><span>₹${parseFloat(subtotal||total).toLocaleString('en-IN')}</span></div>
      <div class="ps-row"><span>Delivery</span><span>${delCharge===0?'FREE ✅':'₹'+delCharge}</span></div>
      <div class="ps-row total"><span>Total Paid</span><span>₹${parseFloat(total).toLocaleString('en-IN')}</span></div>
    </div>

    <div class="action-btns">
      <a href="https://wa.me/919654171005?text=Order status query: ${order.order_id}" target="_blank" class="btn-wa-track">💬 WhatsApp Support</a>
      <a href="tel:+919654171005" class="btn-invoice">📞 Call Us</a>
    </div>
  </div>`;
}
</script>
</body>
</html>

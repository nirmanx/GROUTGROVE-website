<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login – GroutGrove</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#0F172A,#1E293B);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.nav{position:fixed;top:0;left:0;right:0;height:56px;background:rgba(15,23,42,.9);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:100;border-bottom:1px solid rgba(255,255,255,.06)}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:white;text-decoration:none}
.logo span{color:#EF4444}
.back{color:rgba(255,255,255,.5);font-size:12px;font-weight:600;text-decoration:none}
.back:hover{color:white}

.card{background:white;border-radius:24px;padding:36px 30px;width:100%;max-width:400px;box-shadow:0 32px 80px rgba(0,0,0,.5);margin-top:56px}
@media(max-width:440px){.card{padding:24px 18px}}

/* Tabs */
.tabs{display:flex;background:#F1F5F9;border-radius:12px;padding:4px;margin-bottom:24px}
.tab{flex:1;padding:10px;border:none;border-radius:9px;background:transparent;font-family:'DM Sans';font-size:13px;font-weight:700;color:#64748B;cursor:pointer;transition:all .2s}
.tab.on{background:white;color:#0F172A;box-shadow:0 2px 8px rgba(0,0,0,.1)}

/* Form */
.form-head{text-align:center;margin-bottom:20px}
.form-ico{font-size:40px;margin-bottom:8px;display:block}
.form-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:800;color:#0F172A;margin-bottom:4px}
.form-sub{color:#64748B;font-size:12px;line-height:1.6}

.ff{margin-bottom:12px}
.ff label{display:block;font-size:10px;font-weight:700;color:#64748B;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.inp-wrap{position:relative}
.inp-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;z-index:1}
.ff input,.ff select{width:100%;border:1.5px solid #E2E8F0;border-radius:10px;padding:12px 14px 12px 38px;font-family:'DM Sans';font-size:14px;outline:none;background:#FAFCFB;color:#0F172A;transition:all .2s}
.ff input:focus,.ff select:focus{border-color:#0F172A;background:white;box-shadow:0 0 0 3px rgba(15,23,42,.05)}
.show-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:#94A3B8;padding:4px}

/* Messages */
.msg{display:none;border-radius:10px;padding:11px 14px;font-size:12px;font-weight:600;margin-bottom:14px;line-height:1.5}
.msg.show{display:block}
.msg-err{background:#FEF2F2;border:1.5px solid #FCA5A5;color:#DC2626}
.msg-ok{background:#F0FDF4;border:1.5px solid #86EFAC;color:#166534}
.msg-info{background:#EFF6FF;border:1.5px solid #93C5FD;color:#1D4ED8}

/* Buttons */
.btn-main{width:100%;background:#0F172A;color:white;border:none;border-radius:50px;padding:14px;font-family:'DM Sans';font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-main:hover{background:#1E293B;transform:translateY(-1px);box-shadow:0 6px 18px rgba(15,23,42,.3)}
.btn-main:disabled{background:#94A3B8;cursor:not-allowed;transform:none;box-shadow:none}
.btn-wa{width:100%;background:#25D366;color:white;border:none;border-radius:50px;padding:13px;font-family:'DM Sans';font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-wa:hover{background:#22C55E}

.divider{display:flex;align-items:center;gap:10px;margin:10px 0}
.div-line{flex:1;height:1px;background:#E2E8F0}
.div-txt{font-size:11px;color:#94A3B8;font-weight:600}

.switch-txt{text-align:center;font-size:12px;color:#64748B;margin-top:10px}
.switch-btn{background:none;border:none;color:#0F172A;font-family:'DM Sans';font-size:12px;font-weight:700;cursor:pointer;text-decoration:underline}

/* Benefits */
.bens{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:18px}
.ben{background:#F8FAFC;border-radius:9px;padding:9px 4px;text-align:center;font-size:9px;font-weight:700;color:#475569}
.ben span{font-size:18px;display:block;margin-bottom:3px}

/* Already logged in */
.logged-card{text-align:center}
.logged-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:800;color:#0F172A;margin:10px 0 4px}
.logged-sub{color:#64748B;font-size:13px;margin-bottom:20px}
</style>
</head>
<body>

<div class="nav">
  <a href="../index.html" class="logo">Grout<span>Grove</span></a>
  <a href="../index.html" class="back">← Home</a>
</div>

<div class="card">

  <!-- Already logged in check -->
  <div id="loggedSection" style="display:none">
    <div class="logged-card">
      <span style="font-size:52px;display:block;margin-bottom:10px">👋</span>
      <div class="logged-name" id="loggedName">Welcome!</div>
      <div class="logged-sub" id="loggedSub">Aap already login ho!</div>
      <button class="btn-main" onclick="goHome()">🏪 Products Dekho</button>
      <button class="btn-main" style="background:#22C55E" onclick="window.location.href='cart.html'">🛒 Cart Dekho</button>
      <button onclick="doLogout()" style="width:100%;background:none;border:1.5px solid #E2E8F0;border-radius:50px;padding:11px;font-family:DM Sans;font-size:13px;font-weight:700;color:#94A3B8;cursor:pointer;margin-top:6px">🚪 Logout</button>
    </div>
  </div>

  <!-- Auth section -->
  <div id="authSection">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab on" id="tabLogin" onclick="showTab('login')">🔐 Login</button>
      <button class="tab" id="tabSignup" onclick="showTab('signup')">✨ Sign Up</button>
    </div>

    <!-- Messages -->
    <div class="msg msg-err" id="msgErr"></div>
    <div class="msg msg-ok" id="msgOk"></div>
    <div class="msg msg-info" id="msgInfo"></div>

    <!-- ══ LOGIN ══ -->
    <div id="loginSection">
      <div class="form-head">
        <span class="form-ico">👋</span>
        <div class="form-title">Welcome Back!</div>
        <div class="form-sub">Phone number aur password se login karo</div>
      </div>

      <div class="ff">
        <label>Phone Number *</label>
        <div class="inp-wrap">
          <span class="inp-ico">📱</span>
          <input type="tel" id="lPhone" placeholder="10-digit number" maxlength="10"
            oninput="this.value=this.value.replace(/\D/g,'')"
            onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
      </div>
      <div class="ff">
        <label>Password *</label>
        <div class="inp-wrap">
          <span class="inp-ico">🔒</span>
          <input type="password" id="lPass" placeholder="Your password"
            onkeydown="if(event.key==='Enter')doLogin()"/>
          <button class="show-pw" onclick="togglePw('lPass',this)" type="button">👁️</button>
        </div>
      </div>

      <button class="btn-main" id="btnLogin" onclick="doLogin()">🔐 Login</button>
      <div class="divider"><div class="div-line"></div><div class="div-txt">YA</div><div class="div-line"></div></div>
      <button class="btn-wa" onclick="waContact()">💬 WhatsApp se Help Lo</button>
      <div class="switch-txt">Account nahi? <button class="switch-btn" onclick="showTab('signup')">Sign Up karo</button></div>
    </div>

    <!-- ══ SIGNUP ══ -->
    <div id="signupSection" style="display:none">
      <div class="form-head">
        <span class="form-ico">🎉</span>
        <div class="form-title">Free Account Banao!</div>
        <div class="form-sub">Delhi NCR ke best wholesale prices pao</div>
      </div>

      <div class="bens">
        <div class="ben"><span>📦</span>Orders Track</div>
        <div class="ben"><span>💰</span>Best Price</div>
        <div class="ben"><span>🚚</span>Fast Del.</div>
        <div class="ben"><span>💬</span>WhatsApp</div>
      </div>

      <div class="ff">
        <label>Pura Naam *</label>
        <div class="inp-wrap">
          <span class="inp-ico">👤</span>
          <input type="text" id="sName" placeholder="Apna naam daalo"/>
        </div>
      </div>
      <div class="ff">
        <label>WhatsApp Number * (Orders aayenge yahan)</label>
        <div class="inp-wrap">
          <span class="inp-ico">📱</span>
          <input type="tel" id="sPhone" placeholder="10-digit WhatsApp number" maxlength="10"
            oninput="this.value=this.value.replace(/\D/g,'')"/>
        </div>
      </div>
      <div class="ff">
        <label>City *</label>
        <div class="inp-wrap">
          <span class="inp-ico">📍</span>
          <select id="sCity" style="padding-left:36px">
            <option value="">City select karo</option>
            <option>Delhi</option><option>Noida</option><option>Greater Noida</option>
            <option>Ghaziabad</option><option>Gurugram</option><option>Faridabad</option>
            <option>Meerut</option><option>Hapur</option><option>Other NCR</option>
          </select>
        </div>
      </div>
      <div class="ff">
        <label>Pincode * (Delivery ke liye)</label>
        <div class="inp-wrap">
          <span class="inp-ico">🔢</span>
          <input type="text" id="sPin" placeholder="6-digit pincode" maxlength="6"
            oninput="this.value=this.value.replace(/\D/g,'')"/>
        </div>
      </div>
      <div class="ff">
        <label>Password * (6+ characters)</label>
        <div class="inp-wrap">
          <span class="inp-ico">🔒</span>
          <input type="password" id="sPass" placeholder="Strong password banao"/>
          <button class="show-pw" onclick="togglePw('sPass',this)" type="button">👁️</button>
        </div>
      </div>
      <div class="ff">
        <label>Password Confirm *</label>
        <div class="inp-wrap">
          <span class="inp-ico">🔒</span>
          <input type="password" id="sPass2" placeholder="Same password dobara"
            onkeydown="if(event.key==='Enter')doSignup()"/>
        </div>
      </div>
      <div class="ff">
        <label>Main hoon</label>
        <div class="inp-wrap">
          <span class="inp-ico">🏗️</span>
          <select id="sType" style="padding-left:36px">
            <option value="customer">Customer / Home Owner / Builder</option>
            <option value="contractor">Contractor / Sub-contractor</option>
            <option value="architect">Architect / Interior Designer</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>

      <button class="btn-main" id="btnSignup" onclick="doSignup()">✨ Account Banao — FREE!</button>
      <div class="divider"><div class="div-line"></div><div class="div-txt">YA</div><div class="div-line"></div></div>
      <button class="btn-wa" onclick="waContact()">💬 WhatsApp se Help Lo</button>
      <div class="switch-txt">Account hai? <button class="switch-btn" onclick="showTab('login')">Login karo</button></div>
    </div>
  </div>

</div>

<script>
// ═══════════════════════════════════
// SUPABASE SETUP
// ═══════════════════════════════════
const {createClient} = supabase;
const sb = createClient(
  'https://ddgwdesqicrneikxrcnj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkZ3dkZXNxaWNybmVpa3hyY25qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3Mzc1MTksImV4cCI6MjA4OTMxMzUxOX0.AFH7Sfat5XnYFYocdbjZlYhL5iLG1dO6wXm_FHycAqo'
);

// ═══════════════════════════════════
// HELPERS
// ═══════════════════════════════════
function showErr(msg){
  hide(['msgOk','msgInfo']);
  const el=document.getElementById('msgErr');
  el.innerHTML='❌ '+msg; el.classList.add('show');
}
function showOk(msg){
  hide(['msgErr','msgInfo']);
  const el=document.getElementById('msgOk');
  el.innerHTML='✅ '+msg; el.classList.add('show');
}
function showInfo(msg){
  hide(['msgErr','msgOk']);
  const el=document.getElementById('msgInfo');
  el.innerHTML='ℹ️ '+msg; el.classList.add('show');
}
function hide(ids){ids.forEach(id=>document.getElementById(id)?.classList.remove('show'));}
function hideAll(){hide(['msgErr','msgOk','msgInfo']);}

function togglePw(id,btn){
  const el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
  btn.textContent=el.type==='password'?'👁️':'🙈';
}

function showTab(t){
  hideAll();
  document.getElementById('loginSection').style.display=t==='login'?'block':'none';
  document.getElementById('signupSection').style.display=t==='signup'?'block':'none';
  document.getElementById('tabLogin').classList.toggle('on',t==='login');
  document.getElementById('tabSignup').classList.toggle('on',t==='signup');
}

function goHome(){
  const ret=localStorage.getItem('gg_return');
  if(ret){localStorage.removeItem('gg_return');window.location.href=ret;}
  else window.location.href='../index.html';
}

function saveSession(user){
  localStorage.setItem('nx_user',JSON.stringify({...user,logged_in:true}));
  if(user.pincode) localStorage.setItem('gg_user_pin',user.pincode);
  // Merge cart
  const gc=JSON.parse(localStorage.getItem('groutgrove_cart')||'[]');
  if(gc.length>0&&user.phone){
    localStorage.setItem('groutgrove_cart_'+user.phone,JSON.stringify(gc));
  }
}

function doLogout(){
  localStorage.removeItem('nx_user');
  window.location.reload();
}

function waContact(){
  window.open('https://wa.me/919654171005?text=Mujhe login/signup mein help chahiye GroutGrove par!','_blank');
}

// Simple password hash
function hashPw(phone,pass){
  return btoa(unescape(encodeURIComponent(phone+':'+pass+':gg2026')));
}

// ═══════════════════════════════════
// SIGNUP
// ═══════════════════════════════════
async function doSignup(){
  const name  = document.getElementById('sName').value.trim();
  const phone = document.getElementById('sPhone').value.trim();
  const city  = document.getElementById('sCity').value;
  const pin   = document.getElementById('sPin').value.trim();
  const pass  = document.getElementById('sPass').value;
  const pass2 = document.getElementById('sPass2').value;
  const utype = document.getElementById('sType').value;

  // Validate
  if(!name)           return showErr('Apna naam daalo!');
  if(phone.length<10) return showErr('Valid 10-digit WhatsApp number daalo!');
  if(!city)           return showErr('Apni city select karo!');
  if(pin.length<6)    return showErr('Valid 6-digit pincode daalo!');
  if(pass.length<6)   return showErr('Password 6 characters se zyada hona chahiye!');
  if(pass!==pass2)    return showErr('Dono password same nahi hain!');

  const btn=document.getElementById('btnSignup');
  btn.disabled=true; btn.textContent='⏳ Please wait...'; hideAll();

  try{
    // Step 1: Check duplicate phone
    const {data:dup, error:dupErr} = await sb
      .from('customers')
      .select('phone')
      .eq('phone', phone)
      .maybeSingle();

    if(dupErr && dupErr.code!=='PGRST116'){
      // Table might not have right columns — try alternate
      console.warn('Dup check error:', dupErr.message);
    }

    if(dup){
      showErr('Ye number pehle se registered hai! <button onclick="showTab(\'login\')" style="background:none;border:none;color:#DC2626;font-weight:700;cursor:pointer;text-decoration:underline">Login karo →</button>');
      btn.disabled=false; btn.textContent='✨ Account Banao — FREE!'; return;
    }

    // Step 2: Insert
    const insertData = {
      phone: phone,
      full_name: name,
      name: name,        // fallback column
      city: city,
      pincode: pin,
      password: hashPw(phone,pass),
      user_type: utype,
      status: 'active'
    };

    const {data:newUser, error:insErr} = await sb
      .from('customers')
      .insert([insertData])
      .select()
      .single();

    if(insErr){
      // Try minimal insert if full insert fails
      console.warn('Full insert failed:', insErr.message);
      const {data:minUser, error:minErr} = await sb
        .from('customers')
        .insert([{
          phone: phone,
          full_name: name,
          password: hashPw(phone,pass),
          status: 'active'
        }])
        .select()
        .single();

      if(minErr){
        // Last resort: save only to localStorage
        console.warn('Min insert failed:', minErr.message);
        // Still let them login with localStorage
        const fallback = {id:'local_'+Date.now(),name,phone,city,pincode:pin,utype,_local:true};
        saveSession(fallback);
        // Save to local customer list
        const lc=JSON.parse(localStorage.getItem('gg_local_customers')||'[]');
        lc.push({...fallback,pass:hashPw(phone,pass)});
        localStorage.setItem('gg_local_customers',JSON.stringify(lc));
        showOk('Account ban gaya! (Offline mode) Redirect ho raha hai...');
        setTimeout(()=>goHome(), 1500);
        return;
      }

      // Min insert success
      saveSession({id:minUser?.id,name,phone,city,pincode:pin,user_type:utype});
      afterSignupSuccess(name, phone, city);
      return;
    }

    // Full insert success
    saveSession({
      id: newUser?.id,
      name, phone,
      city: city||newUser?.city,
      pincode: pin||newUser?.pincode,
      user_type: utype
    });
    afterSignupSuccess(name, phone, city);

  }catch(err){
    console.error('Signup error:', err);
    showErr('Error: '+err.message+'<br><small>WhatsApp karo: +91 96541 71005</small>');
    btn.disabled=false; btn.textContent='✨ Account Banao — FREE!';
  }
}

function afterSignupSuccess(name, phone, city){
  showOk(`Welcome ${name}! Account ban gaya! Redirect ho raha hai...`);
  // WhatsApp welcome
  const msg=encodeURIComponent(`🎉 *GroutGrove mein Swagat!*\n\nHi ${name}! 👋\n\nAapka account ban gaya hai!\n📍 City: ${city}\n\nAb aap order kar sakte ho!\n🌐 nirmanx.github.io/nirmanx-website\n📞 +91 96541 71005`);
  setTimeout(()=>window.open(`https://wa.me/91${phone}?text=${msg}`,'_blank'),800);
  setTimeout(()=>goHome(), 1800);
  document.getElementById('btnSignup').disabled=false;
  document.getElementById('btnSignup').textContent='✨ Account Banao — FREE!';
}

// ═══════════════════════════════════
// LOGIN
// ═══════════════════════════════════
async function doLogin(){
  const phone = document.getElementById('lPhone').value.trim();
  const pass  = document.getElementById('lPass').value;

  if(phone.length<10) return showErr('Valid 10-digit phone number daalo!');
  if(!pass)           return showErr('Password daalo!');

  const btn=document.getElementById('btnLogin');
  btn.disabled=true; btn.textContent='⏳ Login ho raha hai...'; hideAll();

  try{
    // Step 1: Find user in Supabase
    const {data:user, error:findErr} = await sb
      .from('customers')
      .select('*')
      .eq('phone', phone)
      .maybeSingle();

    if(findErr){
      console.warn('Find error:', findErr.message);
      // Try local fallback
      const lc=JSON.parse(localStorage.getItem('gg_local_customers')||'[]');
      const localUser=lc.find(u=>u.phone===phone&&u.pass===hashPw(phone,pass));
      if(localUser){
        saveSession(localUser);
        showOk('Login ho gaya! Redirect ho raha hai...');
        setTimeout(()=>goHome(), 1200);
        return;
      }
      throw new Error('Database error: '+findErr.message);
    }

    // Step 2: Phone not found
    if(!user){
      // Check local fallback
      const lc=JSON.parse(localStorage.getItem('gg_local_customers')||'[]');
      const localUser=lc.find(u=>u.phone===phone&&u.pass===hashPw(phone,pass));
      if(localUser){
        saveSession(localUser);
        showOk('Login ho gaya!');
        setTimeout(()=>goHome(), 1200);
        return;
      }
      showErr('Ye number registered nahi hai! <button onclick="showTab(\'signup\')" style="background:none;border:none;color:#DC2626;font-weight:700;cursor:pointer;text-decoration:underline">Sign Up karo →</button>');
      btn.disabled=false; btn.textContent='🔐 Login'; return;
    }

    // Step 3: Password check
    const stored = user.password;
    const entered = hashPw(phone, pass);

    // If no password stored (old account) — allow login and update
    if(!stored || stored==='' || stored===null){
      // Update password
      await sb.from('customers').update({password:entered}).eq('phone',phone);
    } else if(stored !== entered){
      showErr('Password galat hai! WhatsApp karo: +91 96541 71005');
      btn.disabled=false; btn.textContent='🔐 Login'; return;
    }

    // Step 4: Login success!
    saveSession({
      id: user.id,
      name: user.full_name||user.name||'Customer',
      phone: user.phone,
      email: user.email,
      city: user.city,
      pincode: user.pincode,
      user_type: user.user_type||'customer'
    });

    showOk(`Welcome back ${user.full_name||user.name||'Customer'}! Redirect ho raha hai...`);
    setTimeout(()=>goHome(), 1200);

  }catch(err){
    console.error('Login error:', err);
    showErr('Login failed: '+err.message+'<br><small>Help ke liye WhatsApp: +91 96541 71005</small>');
    btn.disabled=false; btn.textContent='🔐 Login';
  }
}

// ═══════════════════════════════════
// INIT — Check if already logged in
// ═══════════════════════════════════
(function init(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('tab')==='signup') showTab('signup');

  const stored=localStorage.getItem('nx_user');
  if(!stored) return;
  try{
    const u=JSON.parse(stored);
    if(u?.logged_in&&u?.phone){
      document.getElementById('authSection').style.display='none';
      document.getElementById('loggedSection').style.display='block';
      document.getElementById('loggedName').textContent='Hi, '+u.name+'! 👋';
      document.getElementById('loggedSub').textContent=u.city||'' ;
    }
  }catch(e){}
})();
</script>
</body>
</html>
